<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Simple Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
      margin: 0 0 20px 0;
    }

    h2 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 5px;
    }

    p {
      color: #555;
      line-height: 1.7;
    }

    ul {
      background: white;
      padding: 20px 40px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    ul li {
      margin-bottom: 8px;
      color: #555;
    }

    form {
      background: white;
      padding: 24px;
      border-radius: 8px;
      border: 1px solid #ddd;
      max-width: 400px;
    }

    label {
      font-weight: bold;
      color: #2c3e50;
    }

    input, textarea {
      width: 100%;
      padding: 8px 12px;
      margin: 6px 0 16px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>

  <h1>Welcome to My Page</h1>
  <p>This is a simple HTML page.</p>

  <h2>About Me</h2>
  <p>My name is Sandhya. I am learning HTML and CSS and I enjoy building web pages.</p>

  <h2>My Hobbies</h2>
  <ul>
    <li>Reading books</li>
    <li>Playing football</li>
    <li>Watching movies</li>
    <li>Coding</li>
  </ul>

  <h2>Contact Me</h2>
  <p>Email: sandhya123@.com</p>
  <p>Phone: 123-456-7890</p>

</body>
</html>
